# =============================================================================
# OTC-RFQ Service Configuration Example
# =============================================================================
# Copy this file to config.toml and modify as needed.
#
# Section names must match the AppConfig struct fields in src/config.rs.
# Environment variables (prefixed OTC_RFQ_) override values set here.
# =============================================================================

# REST/HTTP server configuration
[rest]
host = "0.0.0.0"
port = 8080
max_connections = 1000
request_timeout_secs = 30
enable_cors = true

# SBE TCP server configuration
[sbe]
host = "0.0.0.0"
port = 50052
max_connections = 1000
read_timeout_secs = 30
max_message_size = 8192
max_subscriptions = 100

# Logging configuration
[log]
level = "info"
format = "json"

# Database configuration
[database]
url = "postgres://localhost/otc_rfq"
pool_size = 10
min_connections = 1
connection_timeout_secs = 30

# Venue configuration
[venues]
enable_0x = true
enable_1inch = true
enable_uniswap = false
enable_hashflow = false
quote_timeout_ms = 500
max_concurrent_requests = 100
